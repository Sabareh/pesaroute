services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pesaroute
      POSTGRES_USER: pesaroute
      POSTGRES_PASSWORD: pesaroute
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY before running docker compose}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      DATABASE_URL: postgres://pesaroute:pesaroute@postgres:5432/pesaroute
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:19006,http://localhost:8081
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./apps/api
    command: celery -A config worker --loglevel=info --uid=nobody
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY before running docker compose}
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      DATABASE_URL: postgres://pesaroute:pesaroute@postgres:5432/pesaroute
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
