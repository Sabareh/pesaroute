# Non-CIS education routes: NSE/CDSC, SACCO, pension, insurance, fixed deposit,
# global investing, crypto, land. These are *education routes*, not endorsements.
# Equity/global/crypto/land are scenario-only (no implied return, no live prices).
source:
  slug: pesaroute-editorial-routes
