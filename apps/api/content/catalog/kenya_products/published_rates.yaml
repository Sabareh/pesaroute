# Source-linked, dated published rates. Values are NOT invented — each is fetched
# from the cited source and stamped with the date it was reported. Refresh by
# re-fetching the sources and updating rate_value + snapshot_date.
#
# CBK Treasury bill rates are official auction results. MMF effective annual yields
# are compiled by a third-party tracker (Serrari) from provider-reported figures;
# they are labelled third_party confidence and "as at" the report date. Verify the
# current figure with the provider before acting.
sources:
  cbk_tbills:
    slug: cbk-treasury-bills
    name: CBK Treasury Bills auction results
    url: https://www.centralbank.go.ke/bills-bonds/treasury-bills/
    confidence: official
  serrari_mmf:
    slug: serrari-mmf-index
    name: Serrari Group Kenya KES MMF index
    url: https://serrarigroup.com/ke/mmf/
    confidence: third_party

rate_groups:
  - source: cbk_tbills
    snapshot_date: "2026-06-18"
    rate_type: t_bill_average_rate
    rate_period: auction
    currency: KES
    raw_label_suffix: "average rate, CBK auction 18 Jun 2026"
    entries:
      - match_name: "91-Day Treasury Bill"
        rate_value: "8.7067"
      - match_name: "182-Day Treasury Bill"
        rate_value: "8.6006"
      - match_name: "364-Day Treasury Bill"
        rate_value: "8.8715"

  - source: serrari_mmf
    snapshot_date: "2026-06-17"
    rate_type: effective_annual_yield
    rate_period: annual
    currency: KES
    product_type: money_market_fund
